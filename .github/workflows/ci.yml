name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit production dependencies
        run: pnpm audit --prod
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Check npm package contents
        run: pnpm pack:check

  macos:
    name: macOS Swift tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test Swift package
        run: swift test --package-path macos/FeishuBotApp
